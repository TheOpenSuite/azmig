version: 2
project_name: azmig

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64 
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]

snapshot:
  version_template: "{{ incpatch .Version }}-next" 

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'